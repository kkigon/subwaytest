  <circle cx="12" cy="44" r="5.5" fill="#fff" stroke="#0052A4" stroke-width="3"/>
  <circle cx="40" cy="44" r="5.5" fill="#fff" stroke="#0052A4" stroke-width="3"/>
  <!-- 분기 노선 (주황) -->
  <path d="M40 30 L52 30" fill="none" stroke="#EF7C1C" stroke-width="6" stroke-linecap="round"/>
  <circle cx="52" cy="30" r="5" fill="#fff" stroke="#EF7C1C" stroke-width="3"/>
